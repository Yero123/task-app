services:
  db-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: task_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d task_test"]
      interval: 3s
      timeout: 5s
      retries: 10
